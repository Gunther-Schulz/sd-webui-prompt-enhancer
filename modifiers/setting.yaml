time period:
  🎲 Random Era:
    # Data-driven (◆): seed-picked from Danbooru's decade-style tags.
    # Pool: real DB tags matching ^\d{4}s_(style)$ with post_count >= 50.
    # Breaks the qwen3 LLM bias that collapses 81% of "random era" generations
    # onto 1920s (flapper/art-deco training prior) — that tag doesn't even
    # exist in Danbooru. The 7-member pool spans 1930s through 2000s.
    behavioral: ""   # filled at runtime from picked DB tag
    keywords: ""    # filled at runtime
    source:
      db_pattern: "^\\d{4}s_\\(style\\)$"
      min_post_count: 50
      template: "Set this scene in the {display} aesthetic. Reflect the era authentically in clothing, surroundings, color grading, and light."
  🎲 Random Time of Day:
    behavioral: "Choose a specific time of day. Be surprising. State the resulting lighting conditions."
    keywords: ""
  Medieval:
    behavioral: "Medieval era."
    keywords: "medieval era, stone and wood, candlelight and torchlight, armor or rough cloth, feudal setting"
  Victorian:
    behavioral: "Victorian era."
    keywords: "victorian era, ornate interiors, gas lamps, corsets and tailcoats, dark wood, lace, formal posture"
  1920s Art Deco:
    behavioral: "1920s art deco era."
    keywords: "1920s, art deco, geometric patterns, flapper dress, jazz age, gold and black, opulent"
  1950s Americana:
    behavioral: "1950s Americana."
    keywords: "1950s, americana, chrome and pastel, diners, cars with fins, rockabilly, optimistic suburban"
  1970s:
    behavioral: "1970s era."
    keywords: "1970s, warm earth tones, shag carpet, bell-bottoms, wood paneling, soft focus, analog warmth"
  1980s:
    behavioral: "1980s era."
    keywords: "1980s, neon colors, big hair, synthwave aesthetic, VHS texture, bold graphic patterns"
  Futuristic:
    behavioral: "Futuristic era."
    keywords: "futuristic, advanced technology, clean or dystopian surfaces, LED lighting, minimal or maximal design"
  Ancient:
    behavioral: "Ancient era."
    keywords: "ancient era, stone temples, draped fabric, torchlight, weathered surfaces, mythic scale"

detail:
  # Data-driven (◆) randoms: picked from Danbooru's disambiguation-suffix
  # categories. The `_(X)` suffix is Danbooru's own human curation to
  # distinguish real-world concepts from same-name characters/franchises,
  # so these pools are semantically pure without any allowlist from us.
  🎲 Random Flower:
    behavioral: ""
    keywords: ""
    source:
      db_pattern: "_\\(flower\\)$"
      min_post_count: 50
      template: "Place a {display} somewhere in the scene — as a prop, detail, or motif. Describe its color and texture."
  🎲 Random Food:
    behavioral: ""
    keywords: ""
    source:
      db_pattern: "_\\(food\\)$"
      min_post_count: 50
      template: "Include {display} in the scene — as a prop, meal, or detail. Describe how it looks and where it is."
  🎲 Random Animal:
    behavioral: ""
    keywords: ""
    source:
      db_pattern: "_\\(animal\\)$"
      min_post_count: 100
      template: "Include a {display} somewhere in the scene — as companion, background life, or detail. Describe its presence."
  🎲 Random Constellation:
    behavioral: ""
    keywords: ""
    source:
      db_pattern: "_\\(constellation\\)$"
      min_post_count: 50
      template: "Incorporate the {display} constellation as a thematic element — visible in the sky, depicted as a motif, or implied through symbolism and color."

