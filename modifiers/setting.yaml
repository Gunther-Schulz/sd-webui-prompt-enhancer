# Setting — where and when
_label: Setting

setting:
  Urban:
    behavioral: "The setting is urban — city streets with buildings, traffic, signage, concrete surfaces, either crowds or empty sidewalks. Describe specific urban features visible, not 'urban' as a label."
    keywords: "urban setting, city streets, buildings, traffic, signage, concrete, crowds or empty sidewalks"
  Rural:
    behavioral: "The setting is rural — countryside, fields or farmland, dirt roads, open sky, a sense of isolation from cities. Describe the specific landscape features and their scale."
    keywords: "rural setting, countryside, fields, farmland, dirt roads, open sky, isolation"
  Underwater:
    behavioral: "The setting is underwater — submerged in water, with water-distorted light, floating hair and fabric, blue-green dim illumination, rising bubbles. Describe the specific underwater effects on the subject and surroundings."
    keywords: "underwater, submerged, water distortion, floating hair and fabric, blue-green light, bubbles"
  Aerial:
    behavioral: "The setting is viewed from above — aerial vantage, landscape seen from height, with patterns and layouts visible only from above. Describe what the elevated perspective reveals."
    keywords: "aerial view, bird's-eye perspective, landscape from above, patterns visible only from height"
  Indoor:
    behavioral: "The setting is indoor — an interior space with walls, ceiling, furniture, and a mix of artificial and window light. Describe specific features of the interior."
    keywords: "indoor setting, interior space, walls and ceiling, furniture, artificial and window light"
  Rooftop:
    behavioral: "The setting is a rooftop — elevated urban vantage with a city skyline as backdrop, open sky above, the building's edge visible. Describe what's visible across the rooftop and below."
    keywords: "rooftop, elevated urban vantage, city skyline backdrop, open sky above, edge of building"
  Underground:
    behavioral: "The setting is underground — a tunnel, basement, or cave. Low ceiling, artificial light, enclosed. Describe the specific underground features and how the space feels confined."
    keywords: "underground, tunnel or basement or cave, low ceiling, artificial light, enclosed space"
  Forest:
    behavioral: "The setting is a forest — trees, undergrowth, dappled light through the canopy, bark texture, moss, earth-tone palette. Describe specific forest features visible around the subject."
    keywords: "forest setting, trees, undergrowth, dappled light through canopy, bark texture, moss, earth tones"
  Desert:
    behavioral: "The setting is a desert — sand or cracked earth, harsh overhead sun, minimal vegetation, heat shimmer in the distance, vast emptiness. Describe specific features of the arid landscape."
    keywords: "desert setting, sand or cracked earth, harsh sun, minimal vegetation, heat shimmer, vast emptiness"
  Coastal:
    behavioral: "The setting is coastal — ocean or sea with waves, sand or rocks, salt air, a visible horizon line, the specific quality of light near large water. Describe the coast's specific features."
    keywords: "coastal setting, ocean or sea, waves, sand or rocks, salt air, horizon line, water light"
  Industrial:
    behavioral: "The setting is industrial — factories or workshops, machinery, pipes, metal surfaces, concrete floors, utilitarian fixtures. Describe specific industrial elements."
    keywords: "industrial setting, factories, machinery, pipes, metal surfaces, concrete floors, utilitarian"
  Domestic:
    behavioral: "The setting is a home interior — personal objects, a lived-in quality, comfort or clutter, familiar furniture. Describe specific domestic details that signal it's a real home."
    keywords: "domestic setting, home interior, personal objects, lived-in space, comfort or clutter, familiar"

