    behavioral: "Choose a specific location that fits the scene. Vary widely — pick something you haven't picked before. Describe concrete features."
    keywords: ""
  🎲 Random Weather:
    behavioral: "Choose specific weather conditions (be surprising). State how they affect visibility, surfaces, and mood."
    keywords: ""
  🎲 Random Props:
    behavioral: "Add two or three specific objects or environmental details that ground the scene. Be surprising — not just generic props."
    keywords: ""
  Urban:
    behavioral: "Urban setting."
    keywords: "urban setting, city streets, buildings, traffic, signage, concrete, crowds or empty sidewalks"
