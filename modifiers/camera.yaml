# Camera — how it's framed

perspective:
  First Person: first-person perspective, POV, camera is the viewer's eyes, hands or body in frame, immersive, present-tense spatial language
  Over the Shoulder: over-the-shoulder shot, camera behind one subject looking at another, partial head or shoulder in foreground, conversational framing
  Low Angle: low angle, camera looking up at subject, imposing, powerful, dominant, subject towers over viewer
  High Angle: high angle, camera looking down at subject, diminished, vulnerable, small in frame, environmental context visible
  Bird's Eye: bird's-eye view, directly overhead, looking straight down, flat perspective, patterns and layout visible, god's-eye
  Worm's Eye: worm's-eye view, camera on ground looking up, extreme low angle, towering subject, sky as background, dramatic scale
  Dutch Angle: dutch angle, tilted camera, diagonal horizon line, unease, tension, disorientation, off-balance composition
  Through Object: shot through foreground object, framed by doorway or window or foliage or fence, layered depth, voyeuristic peek
  Reflection Shot: seen through reflection, mirror or puddle or window glass, indirect view, doubled perspective, compositional depth

distance:
  Extreme Close-up: extreme close-up, single detail fills the frame, eye or hand or mouth or object, texture and pores visible, intimate
  Close-up: close-up, head and shoulders, face fills most of frame, expression and skin detail, shallow depth of field
  Medium Close-up: medium close-up, chest up, upper body framing, conversational distance, expression and gesture visible
  Medium Shot: medium shot, waist up, most common general framing, body language and expression balanced
  Medium Wide: medium wide shot, knees up, body language prominent, some environment context visible
  Full Body: full body shot, head to toe, complete figure visible, pose and stance, clothing and footwear, moderate environment
  Wide Shot: wide shot, subject with significant environment, full body small in frame, setting context dominant
  Extreme Wide: extreme wide shot, subject tiny in vast environment, landscape dominance, scale and isolation, epic scope
  Body Detail: tight crop on body, abstracting torso or limbs into form and shape, skin texture, curves and lines, fine art body study

focus:
  Focus Action: prioritize action, describe movement first and in most detail, supporting elements secondary, dynamic energy central
  Focus Emotion: prioritize emotion, mood drives every visual choice, viewer should feel the emotion immediately, expression and atmosphere central
  Focus Setting: prioritize environment, rich setting detail, architecture surfaces light weather objects, subject exists within the world
  Focus Subject: prioritize the subject's appearance and presence, detailed portrait-like attention, clothing skin features, commanding the frame
  Focus Composition: prioritize framing and visual balance, geometric arrangement, leading lines, negative space, deliberate placement of elements
  Focus Texture: prioritize material surfaces and tactile quality, close attention to fabric skin metal wood water, tangible and touchable

technique:
  Long Exposure: long exposure, motion blur, light trails, silky water, streaked clouds, ghosted figures, time passing in single frame
  Double Exposure: double exposure, two images blended, portrait filled with landscape, overlapping textures, ghostly composite
  Tilt-Shift: tilt-shift, miniature effect, extreme selective focus, narrow band of sharpness, diorama, elevated angle, slightly oversaturated
  Macro: macro, extreme close-up, fine details, shallow depth of field, textures invisible at normal distance
  Silhouette: silhouette, backlit dark outline, bright background, shape and outline only, contrast between dark figure and luminous background
  Male Gaze: male gaze, camera lingers on the female subject's body, objectifying framing, emphasis on curves and physical appearance, subject as spectacle, cinematic male perspective
  Female Gaze: female gaze, emphasis on emotion and context, subject has agency and interiority, intimate but not objectifying, focus on expression and gesture over body, warmth, connection

motion:
  Frozen Action: frozen action, dynamic motion, motion blur, mid-movement, flying hair or fabric, splashing water, kinetic force, peak of action

material:
  Leather: leather texture, worn or polished, creases, grain, brown or black, rugged tactile quality
  Silk: silk fabric, smooth sheen, light-catching folds, delicate drape, luxurious surface
  Denim: denim texture, indigo blue, visible weave, faded or raw, casual sturdy fabric
  Lace: lace, delicate pattern, semi-transparent, intricate needlework, feminine detail
  Metal: metal surfaces, steel or iron or copper, reflections, industrial sheen, cold hard texture
  Glass: glass, transparent or reflective, refractions, fragile appearance, clean edges, light passing through
  Wet Skin: wet skin, water droplets on surface, sheen, glistening highlights, tactile moisture
