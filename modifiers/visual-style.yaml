# Visual Style
_label: Visual Style

# Disciplined pattern: behavioral uses paraphrased language, avoids
# reusing exact phrases from keywords, and does not name specific
# directors/studios/franchises (Tags mode still gets the names via
# keywords).

color:
  Black and White:
    behavioral: "The output is monochromatic — no color anywhere, everything rendered in luminance. Describe the relationship between light and dark as the dominant visual concern."
    keywords: "black and white, monochrome, tonal contrast, no color, luminance, grain, interplay of light and dark"
  Vintage Film:
    behavioral: "The image carries the look of aged film stock — subtle color drift, warmth in the highs, muted blacks, a patina of grain. Describe the analog imperfections."
    keywords: "vintage film, film grain, color shifts, warm highlights, faded blacks, expired film stock, nostalgic, textured"
  Cinematic Grade:
    behavioral: "The palette is polished for film — cool skin tones against warm highlights, deep but slightly lifted shadows, muted midtones. Describe the relationships between teal and orange regions."
    keywords: "cinematic color grade, teal-and-orange, crushed blacks, lifted shadows, midtone desaturation, Hollywood film look"
  Pastel:
    behavioral: "The palette stays gentle and washed — softly desaturated hues in the cream/blush/powder range, highlights slightly lifted. Describe the quiet color relationships."
    keywords: "pastel, soft desaturated colors, blush pink, powder blue, lavender, mint, cream, lifted highlights, gentle, delicate"
  Retro:
    behavioral: "The image carries an era-specific analog fingerprint — grain, light leaks, color drift, dated styling choices. Describe the specific era signs."
    keywords: "retro, era-specific film stock, analog imperfections, grain, light leaks, color shifts, period-authentic styling"

