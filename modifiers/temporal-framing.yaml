# Mode — temporal and structural framing
_label: Temporal Framing

temporal framing:
  Still: frozen moment, static composition, describe a single instant in time, no temporal language, no movement, captured pose
  Scene: chronological action, present-progressive verbs, temporal flow, describe movement unfolding over time, use connectors like as then while, no timestamps or scene cuts
  Cinematic: describe as a camera move, pan dolly crane tracking shot, cinematic transitions, opening wide then pushing in, film language
  POV: first-person perspective, describe what the viewer sees and feels directly, hands or body partially visible, immersive present-tense spatial language
  Timelapse: compress time, show change over hours or days, sunrise to sunset, seasons shifting, clouds racing, shadows sweeping, accelerated transformation
  Loop: seamless loop, end connects to beginning, cyclical motion, continuous flow, no start or stop, perpetual movement
