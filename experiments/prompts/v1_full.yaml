# Curated test prompt set for V1 rating.
#
# 12 prompts spanning the real failure modes observed this session,
# plus control cases. Each prompt has a `note` describing what we
# expect to see in the output — the rater checks against that intent,
# not a fixed metric.
#
# Expand this set when rating reveals a blind spot (a failure mode
# not exercised by any existing prompt).

# ── Named entities ──────────────────────────────────────────────────
- id: miku_cake
  source: "hatsune miku holding a cake, chibi"
  modifiers: []
  note: "Well-known character + simple scene. Expect hatsune_miku tag, vocaloid series, cake + chibi, twintails."

- id: rem_maid
  source: "rem from re:zero in maid outfit"
  modifiers: []
  note: "Character named with series hint. Expect rem_(re:zero) char tag, re:zero series, maid outfit details."

# ── Unnamed subjects, terse to rich ─────────────────────────────────
- id: girl_cafe
  source: "1girl, long hair, cafe"
  modifiers: []
  note: "Tag-style terse input. Expect preserved 1girl/long_hair/cafe + coherent scene tags."

- id: woman_tree
  source: "a woman reading under a tree"
  modifiers: []
  note: "Natural language scene. Expect 1girl, tree, reading/book, outdoor lighting."

- id: cyberpunk_street
  source: "a cyberpunk street scene with holograms"
  modifiers: []
  note: "Scene with no human named. Expect cyberpunk, neon/holograms, city/street. Subject count optional."

# ── Modifier tests (slot_fill + intensity) ──────────────────────────
- id: girl_random_artist
  source: "girl"
  modifiers: ["🎲 Random Artist"]
  note: "Terse source with Random Artist modifier. MUST produce @artist. Check artist actually varies per seed."

- id: samurai_random_artist
  source: "a lone samurai at dusk with a sword"
  modifiers: ["🎲 Random Artist"]
  note: "Richer source + Random Artist. Expect samurai/katana/dusk + @artist."

- id: girl_random_artist_random_era
  source: "girl"
  modifiers: ["🎲 Random Artist", "🎲 Random Era"]
  note: "User's reported failure case. Expect @artist AND era-appropriate cues (decade/clothing)."

# ── Explicit content (safety determination) ─────────────────────────
- id: girl_sex
  source: "girl, sex"
  modifiers: []
  note: "Explicit source, no NSFW modifier. MUST produce nsfw or explicit safety tag, preserve sex act in tags."

- id: girl_sex_intensity_explicit
  source: "girl, sex"
  modifiers: ["Explicit"]
  note: "Explicit source + intensity modifier. Should be unambiguously explicit-tagged."

# ── Edge cases ──────────────────────────────────────────────────────
- id: empty_plain
  source: ""
  modifiers: []
  note: "Dice roll. Any scene. Check LLM invents something sensible grounded in real tags."

- id: empty_random_artist_random_setting
  source: ""
  modifiers: ["🎲 Random Artist", "🎲 Random Setting"]
  note: "Dice roll + modifiers. Expect @artist + coherent setting, no incoherent mashup."

# ── Weird-tag reproducers ───────────────────────────────────────────
# Added 2026-04-21 after user reported sparse_leg_hair, overhead_lights,
# simple_fish appearing "often" on terse/aesthetic sources. These prompts
# mirror the SHAPE of the user's live-Forge triggers so we can measure
# weird-tag rate in the harness and target it with future variants.
- id: girl_beautiful_location
  source: "girl, beautiful location"
  modifiers: []
  note: "User-reported trigger: overhead lights + simple fish observed on garden outputs. Expect weird-tag contamination rate measurable vs V11 baseline."

- id: sexy_girl_beautiful_location
  source: "sexy scantly clad girl, beautiful location"
  modifiers: []
  note: "User-reported trigger: sparse leg hair observed. Expect body-detail bias to surface from vague-aesthetic framing."

- id: girl_serene
  source: "girl, serene"
  modifiers: []
  note: "User-reported trigger. Terse aesthetic adjective source — qwen priors fill in tropes."

- id: girl_bare
  source: "girl"
  modifiers: []
  note: "Minimum source. Maximum latitude for LLM to fill with training priors."
