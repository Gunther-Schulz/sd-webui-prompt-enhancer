# Story-mode test seeds.
#
# Each entry is a complete story-generation request: source idea, length,
# mode, and modifiers (must match real entries in modifiers/*.yaml — the
# harness fail-louds on unknown names).
#
# Coverage axes designed into this corpus:
#   - LENGTH       3 / 4 / 6 / 8 / 12 panels (across multiple seeds each)
#   - MODE         Linear / Vignettes / Character Study / Before & After /
#                  Day in the Life / Two Viewpoints (multiple seeds per mode)
#   - GENRE        contemporary / fantasy / sci-fi / horror / noir /
#                  romance / historical / mythological / post-apocalyptic /
#                  slice-of-life
#   - CAST         solo / duo / trio / ensemble
#   - SUBJECT      human / animal / place / object/vehicle
#   - SOURCE       concrete (named) / generic (descriptive) / vague /
#                  empty (dice-roll)
#   - MODIFIERS    cover lighting / mood / atmosphere / setting /
#                  visual style / camera / activity / time period
#
# Total: 35 seeds. Variant matrix on full corpus = 5 variants × 35 seeds
# × 2 LLM seeds = 350 runs (~few hours on GPU, an evening on CPU).
#
# `placeholder: true` flags seeds the maintainer might want to swap with
# their actual use cases. The non-placeholder ones are stressors designed
# to surface variant-specific failure modes (length thresholds, schema
# breakage on long output, cast-confusion, modifier conflicts, etc.).


# ── Length stress (single mode = Linear, varying length) ────────────────

- id: dancer_3_linear
  source: "A ballet dancer in the moments before, during, and after a performance"
  length: "3 panels"
  story_mode: "Linear"
  modifiers:
    - "Backlit"
    - "Cinematic Grade"
  note: "Minimum-length stress test. 3 panels means each beat must carry
        significant story weight; tests compression."
  placeholder: false

