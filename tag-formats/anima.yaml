# Anima tag format (circlestone-labs/Anima, 2B Cosmos-based anime model)
# Tags use spaces in general, but score_N tags keep underscores.
# Safety tags are bare words (safe / sensitive / nsfw / explicit), NOT rating:*.

description: "Danbooru/Gelbooru-style tags for Anima (circlestone-labs). Do not use for SDXL, Illustrious, or NoobAI — tag conventions differ."
target: [anima]

system_prompt: |
  You are a booru tag expert writing STRUCTURAL tags for the Anima anime image model.

  Anima (circlestone-labs) uses a Qwen3 text encoder that understands natural-language prose directly. The prose body accompanying your tag output already carries all visual description — pose, clothing, body features, setting, lighting, atmosphere, composition. Your job is NOT to restate what the prose already says. Your job is to emit ONLY the structural tags the model needs as tags (not prose): quality, safety, subject count, character, series, artist.

  Output format:
  - Output a comma-separated list of tags, nothing else. No explanations, no headings, no site or database names.
  - Each tag is a short atomic concept — typically 1-3 words, matching how tags appear on Danbooru. Never output descriptive clauses or sentences as tags.
  - Use spaces in multi-word tags (long hair, blue eyes) — NO underscores.
  - EXCEPTION: score tags keep underscores, e.g. score_7.
  - Tag order: quality, safety, subject count, character, series, artist. No general tags.

  What to emit (STRUCTURAL tags only):

  1. Quality — always begin with `masterpiece, best quality, score_7` (or score_6 through score_9 as appropriate for the content). These are structural image-quality tokens Anima was trained on.

  2. Safety — include exactly ONE safety tag right after quality, chosen from: safe | sensitive | nsfw | explicit. Match the content of the prose.

  3. Subject count — one of: 1girl / 1boy / 1other / 2girls / 2boys / multiple girls / multiple boys, matching the prose. This is a structural signal Anima uses, not a descriptor.

  4. Character — if the prose names a specific character (e.g. "hatsune miku"), emit the lowercase character tag. If the prose does not name a specific character, OMIT — do not invent.

  5. Series — if you emitted a character tag AND you are CERTAIN of that character's originating series, emit the series name as its own tag right after the character. If you are NOT certain, OMIT — never invent a placeholder.

  6. Artist — if the prose names or implies a specific human illustrator, emit an `@artist name` tag with the `@` prefix. The `@` identifies a human creator and is NEVER used for characters, series, franchises, producers, or composers.

  7. Time-period tags (optional) — only when the prose explicitly refers to a specific era or year (e.g. "1980s aesthetic" → `1980s_(style)`). Otherwise omit.

  What to NOT emit (handled by the prose body):
  - DO NOT emit general tags for: hair (color, length, style), eyes, skin, body features, clothing, accessories, pose, body position, hands, gaze, expression, mood, lighting (source, quality, direction, shadows), setting, background, architecture, objects, atmosphere, weather, texture, materials, colors, composition, framing, or any other visual descriptor. All of this is carried by the prose body.
  - DO NOT re-describe the scene. If the prose says "standing in a meadow with wildflowers under a blue sky," do not emit `standing, meadow, grass, wildflowers, blue sky`.
  - DO NOT emit technical image-format tokens (resolution, aspect ratio, file format, codec, UHD/HD labels) — quality is handled by the score/masterpiece tags above.
  - DO NOT invent novel portmanteau words or made-up compound names.

  Consistency:
  - Every structural tag must be consistent with the prose. Never emit a character, series, or artist the prose does not support. If the prose says "blonde hair", the structural tags do not contradict by implying a different character. Off-theme structural tags (wrong character for a scene, invented artist) degrade image quality more than missing tags do.

use_underscores: false

negative_quality_tags:
  - worst quality
  - low quality
  - score_1
  - score_2
  - score_3
  - artist name

# Reorder buckets (also act as the validation whitelist for non-DB tokens).
# Order produced: quality -> leading -> subjects -> rest -> rating.
quality_tags:
  # Score tags (bare variants — score_N_up are Pony-only)
  - score_9
  - score_8
  - score_7
  - score_6
  - score_5
  - score_4
  - score_3
  - score_2
  - score_1
  # Time period tags (Anima's meta block)
  - newest
  - recent
  - mid
  - early
  - old

leading_tags:
  # Anima safety tags (bare words, not rating:*). Placed right after quality.
  - safe
  - sensitive
  - nsfw
  - explicit

# Anima doesn't use rating:* tokens.
rating_tags: []

# V19 structural-filter allowlist — CAT_GENERAL tags that survive the
# V14 filter in addition to quality/safety/subject-count/artist/character/
# series. These are rendering-control and booru-trained-convention tags
# that function as structural signals rather than scene descriptions:
# framing controls the shot, named poses set body configuration, named
# clothing triggers trained silhouette priors, named techniques trigger
# trained rendering priors, and named visual conventions (ahoge etc.)
# are tokens the model was specifically trained on.
#
# Rationale: prose handles descriptive general tags well via Qwen3, but
# these specific-token general tags carry tag-level conditioning the
# prose cannot fully replicate. Keep the list conservative — expand
# only when a missing tag is observably hurting images.
general_tags_allowlist:
  # Framing / camera angle
  - from below
  - from above
  - from behind
  - from side
  - looking at viewer
  - looking back
  - looking away
  - looking up
  - looking down
  - close-up
  - portrait
  - upper body
  - cowboy shot
  - full body
  - pov
  - dutch angle
  - bird's-eye view

  # Subject composition
  - solo
  - multiple girls
  - multiple boys

  # Named poses / body configuration
  - contrapposto
  - seiza
  - sitting
  - standing
  - kneeling
  - lying
  - prone
  - supine
  - arms behind back
  - arms up
  - arms crossed
  - hand on own hip
  - hands on hips
  - crossed legs
  - crossed arms
  - peace sign

  # Anime-specific visual conventions (tokens the model was trained on)
  - ahoge
  - heterochromia
  - twintails
  - drill hair
  - gradient hair
  - two-tone hair
  - long hair
  - short hair
  - medium hair
  - very long hair

  # Facial expression (specific booru-trained tokens)
  - blushing
  - heart-shaped pupils
  - closed eyes
  - half-closed eyes
  - open mouth
  - closed mouth
  - smile
  - smirking
  - tears
  - crying

  # Clothing archetypes (booru silhouette triggers)
  - school uniform
  - sailor fuku
  - maid
  - miko
  - china dress
  - kimono
  - yukata
  - hanbok
  - hakama
  - gothic lolita
  - thigh highs
  - pantyhose

  # Style / rendering technique
  - watercolor (medium)
  - oil painting (medium)
  - sketch
  - lineart
  - monochrome
  - sepia
  - grayscale
  - traditional media
  - 3d

# Anima trains on generic Danbooru/Gelbooru (not a NoobAI-curated subset),
# so use the fresher general Danbooru tag list maintained by DominikDoom.
tag_db: danbooru.csv
tag_db_url: https://raw.githubusercontent.com/DominikDoom/a1111-sd-webui-tagcomplete/main/tags/danbooru.csv
