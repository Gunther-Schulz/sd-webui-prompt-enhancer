# Local Overrides — Example
#
# Place your custom files in a directory and point to it via:
#   - The "Local Overrides Directory" field in the UI
#   - The PROMPT_ENHANCER_LOCAL environment variable
#
# File conventions in the local directory:
#   _bases.yaml  → adds entries to the Base dropdown (flat: name -> prompt)
#   *.yaml       → adds entries to the Modifiers dropdown (categorized)
#
# Modifier format: categories containing named keyword strings.
# Categories can match existing ones (entries are merged) or be new.
# Files are loaded in alphabetical order.
#
# Example modifier file (e.g. my-styles.yaml):

# Add entries to an existing category
lighting:
  Studio Strobe: studio strobe, hard flash, sharp shadows, high contrast, frozen motion, commercial lighting

# Create a new category
my favorites:
  Cozy Autumn: autumn, warm tones, falling leaves, knit sweaters, golden light, hot drinks, wood smoke
  Rainy Tokyo: tokyo streets, neon reflections, rain, umbrellas, kanji signage, vending machine glow, night
  Old Library: old library, leather books, dust motes, reading lamp, dark wood, warm amber, silence

# Example _bases.yaml (adds to Base dropdown):
#
# My Custom Base: |
#   You are a Creative Assistant. Given a user's raw input, expand it into
#   a detailed prompt for...
#   (full system prompt here)
