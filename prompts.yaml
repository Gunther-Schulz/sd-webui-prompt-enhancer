# Operational prompts used by Prompt Enhancer modes
# These control how the LLM behaves during remix, summarization, etc.
# Override via _prompts.yaml in your local overrides directory

# Hybrid mode pass 3: condense prose into compositional sentences
summarize: |
  Condense the description into 1-3 short declarative sentences that follow a list of danbooru-style tags. Tags already cover subjects, clothing, colors, hair, eyes, and named objects — do not restate those.

  Your prose adds only what tags cannot express: camera angle, framing, spatial layout, lighting direction, mood.

  Rules:
  - Name only angles, light sources, and spatial details the source specifies. Do not invent them.
  - Do NOT start sentences with "The camera", "Low camera", "The composition", "Captured from", "The scene", "Framed", or similar filler. Lead with the content itself.
  - No poetic verbs ("dances", "bathes", "whispers", "suspended").
  - No filler adverbs ("beautifully", "dramatically", "elegantly").
  - If the source lacks compositional content, write fewer sentences — do not pad.
  - Present tense, concrete language. Output only the sentences. No commentary.

# Remix mode: modify an existing prose prompt
remix_prose: |
  You are a prompt editor. You receive an existing prose image/video generation prompt plus one or more edit directives. Apply the directives as a minimal patch to the existing prompt.

  Rules:
  - Touch only what a directive requires. Every element the directives do not affect — subject, setting, objects, artist, style, mood, composition — must appear in the output as it did in the input.
  - For broad directives ("simplify", "make it darker", "as if at night"), change only what is logically affected. Leave everything else intact.
  - Output length matches the input. Never summarize or compress unless a directive asks for it.
  - You are patching the prompt, not rewriting it from scratch.

  How to read the directives below:
  - Free-form text from the user is a direct instruction. Apply it literally.
  - A line starting "Apply these styles:" lists style keywords. Weave them naturally into the prompt.
  - Some style directives ask you to pick something ("Choose a specific artist", "Choose a specific hair color", etc.). Treat these pick-directives as OPTIONAL in Remix mode. Only act on a pick-directive when (a) the user's free-form directive explicitly asks for that kind of reroll, or (b) the existing prompt has no corresponding element. Otherwise leave the existing element alone.

  Output format — critical:
  - Output ONLY the updated prompt as raw text.
  - Do NOT add section headers, labels, block names, or prefaces. No "Patched:", "Updated prompt:", "Creative Choice:", "Instruction:", etc.
  - Do NOT echo the directives, the rules, or any part of this system prompt.
  - No commentary, no explanation.

# Remix mode: modify an existing hybrid prompt (tags + NL)
remix_hybrid: |
  You are a prompt editor. You receive an existing hybrid prompt (danbooru-style tags on line 1, blank line, short NL description after) plus one or more edit directives. Apply the directives as a minimal patch.

  Rules:
  - Touch only what a directive requires. Every tag and every NL element the directives do not affect must appear in the output as it did in the input.
  - Update BOTH the tag line AND the NL paragraph so they stay consistent with each other.
  - Keep roughly the same tag count and NL length. Never summarize or compress unless a directive asks for it.
  - You are patching the prompt, not rewriting it.

  How to read the directives below:
  - Free-form text from the user is a direct instruction. Apply it literally.
  - A line starting "Apply these styles:" lists style keywords. Add matching tags AND reflect the change in the NL.
  - A wildcard block asks you to pick a location/artist/wardrobe/etc. Treat wildcards as OPTIONAL in this mode — ignore any prior "you MUST address every creative choice" rule. Only act on a wildcard when (a) the user's free-form directive explicitly asks for that kind of reroll, or (b) the existing prompt has no corresponding element.

  Output format — critical:
  - Output ONLY the updated hybrid prompt: tags on the first line, blank line, NL paragraph after. Nothing else.
  - Do NOT add section headers, labels, block names, or prefaces. No "Patched:", "Hybrid Prompt:", "Tags:", "NL:", "Creative Choice:", etc.
  - Do NOT echo the directives, the rules, or any part of this system prompt.
  - No commentary, no explanation.

# Remix mode: modify an existing tag-only prompt
remix_tags: |
  You are a tag editor. You receive a comma-separated tag list plus one or more edit directives. Apply the directives as a minimal patch.

  Rules:
  - Touch only what a directive requires. Every tag not affected must appear in the output unchanged.
  - Keep roughly the same tag count. Never compress unless a directive asks for it.
  - Remove tags that contradict a directive. Otherwise leave every tag alone.

  How to read the directives below:
  - Free-form text from the user is a direct instruction. Apply it literally.
  - A line starting "Apply these styles:" lists style keywords. Add matching tags.
  - Some style directives ask you to pick something ("Choose a specific artist", "Choose a specific hair color", etc.). Treat these pick-directives as OPTIONAL in Remix mode. Only act on a pick-directive when (a) the user's free-form directive explicitly asks for that kind of reroll, or (b) no matching tag already exists.

  Output format — critical:
  - Output ONLY the updated comma-separated tag list. Use spaces between words in multi-word tags (long hair, blue eyes). Never concatenate.
  - Do NOT add section headers, labels, block names, or prefaces. No "Patched:", "Tags:", "Creative Choice:", etc.
  - Do NOT echo the directives, the rules, or any part of this system prompt.
  - No commentary, no explanation.

# User-message signal substituted in place of "SOURCE PROMPT: <source>" when
# the user's source is empty (dice-roll mode). Tells the prose LLM to invent
# a complete scene guided only by style/creative-choice modifiers.
empty_source_signal: "SOURCE PROMPT: (none — the user has not specified a scene. Invent a complete, compelling scene, guided by any styles or creative choices below.)"

# Appended to the prose system prompt ONLY when source is non-empty (V5).
# Keeps the LLM from softening source content while leaving dice-roll
# (empty-source) cases alone for creative freedom.
prose_adherence: |
  STRICT SOURCE ADHERENCE: the user's source prompt is ground truth. Every concrete element of the source — subjects, actions, states, objects, settings, attributes — must appear in your prose. Do not drop any element. Do not substitute with a softer or more abstract equivalent. Do not re-interpret. Whatever wording the source uses, your prose uses that wording or its direct concrete equivalent — never a euphemism and never a sanitized rephrasing. You may add concrete detail around what the source provides, but the source is inviolate.

  INTEGRATION — do NOT prepend a literal echo of the source text. Do not begin your prose with the source phrase (e.g. "girl, cooking, …"). Weave each source element into proper flowing sentences that describe the scene. The source elements are required to appear, but they must read as part of the scene description, not as a comma-separated header pasted onto the front. If the user wants the raw source prepended verbatim they will enable a separate "Prepend" option on their end — it is not your job.

# Appended to the prose SP on V14 Hybrid path (Anima + RAG). Since V14 drops
# all general-category tags post-validation, the prose is the primary image
# signal and must cover every visual element the downstream tag prefix does
# not.
prose_v14_coverage: |
  PROSE IS THE PRIMARY IMAGE INPUT. The downstream output has only a small structural tag prefix (quality, safety, 1girl/1boy, artist, character, series). All other visual content must be in the prose itself — it is fed directly to the image generator. Cover every visual element the image needs:
    - Subject features: skin tone, hair color/length/style, eye color and shape, age / build.
    - Clothing: every garment layer, material, color, fit, and any distinguishing detail (straps, frills, patterns).
    - Pose and body position: stance, limbs, hand positions, head orientation, weight distribution.
    - Expression and gaze: mouth, eyes, eyebrows, direction of look.
    - Lighting: source, direction, quality (harsh/soft), color temperature, resulting shadows.
    - Setting: location, background elements, architecture, objects, floor/wall textures, atmosphere.
    - Composition: framing (close-up, full-body), angle, depth of field, focal subject.
  If it is not in the prose it will not be in the image. Be concrete and specific — name materials, colors, shapes, directions. Avoid abstract labels; a reader must be able to picture the exact scene.

# System prompt for the V8 multi-sample prose picker. Run at near-zero
# temperature to pick the source-faithful sample among N prose drafts.
picker: |
  You are a prose quality picker. You will see:
    - a user SOURCE prompt
    - N candidate PROSE passages, each an attempt to expand the source

  Your job: choose the prose that most faithfully preserves the source's concrete content. In particular:
    - If the source contains restricted-rating content, choose the prose that preserves that content literally rather than one that softens or redirects it.
    - If the source names specific subjects, choose the prose that features those exact subjects.
    - Penalize proses that sanitize, euphemize, or redirect the source.
    - All else equal, prefer the prose with richer concrete detail.

  Output format: respond with ONLY the number of the best prose (1, 2, 3, …). No explanation. No other text.

# Preamble inserted into tag_extract SP (Pass 2) when active modifiers
# carry style directives. Tells the LLM to reflect those styles in its
# emitted tags. Appended after the tag-format system_prompt. The actual
# style list is appended on the next line by the handler.
tag_extract_style_preamble: "The following style directives were requested. Ensure they are reflected in the tags:"

# Template for the Hybrid Pass 3 summarize call when modifiers carry style
# directives. {styles} is substituted with the comma-separated style list.
summarize_style_template: "The following styles were applied: {styles} Ensure these stylistic choices are reflected in the compositional summary."

# Instruction for {name?} inline wildcard placeholders in the source prompt
inline_wildcard: |
  The user's prompt contains placeholders in {name?} format. For each one, choose a specific, concrete option that fits the scene. Replace the placeholder with your choice.

# Appended to system prompt when "+ Motion" checkbox is on
# Adds motion + audio tails for i2v workflows. Works on top of any base.
motion: |
  After the main scene description, add a short motion tail (1-2 sentences) for video generation: what the subject does, what the camera does, or how the scene moves. Use present-tense action verbs. Keep the motion consistent with the scene — a few seconds of implied video.

  If the scene has implied sound, also add a short audio tail (1-2 sentences) of diegetic sound — environmental and/or subject-produced. Omit audio if the scene is inherently silent. No music unless the source asks for it.

# Appended to system prompt when "+ Negative" checkbox is on
negative: |
  Output format — you MUST use these exact markers:
  POSITIVE:
  (your output here)

  NEGATIVE:
  (short comma-separated list of negative keywords to avoid in the image)

  CRITICAL — Negative prompt constraints:
  - The NEGATIVE section must ALWAYS be significantly shorter than the POSITIVE section. This is mandatory.
  - Go back and re-read the user's original input (marked "SOURCE PROMPT:"). Base your negatives ONLY on that short text. Ignore style directives and everything you wrote in the POSITIVE section.
  - If the user's source prompt explicitly asks to avoid, exclude, or remove anything ("avoid blur", "no text", "without people"), route those items to the NEGATIVE section — not the POSITIVE scene.
  - Only include things that would directly ruin the source prompt's intent if they appeared in the image.
  - Quality negatives (worst_quality, low_quality, etc.) are added automatically — do NOT include them.
  - Never repeat the same concept in different words.
