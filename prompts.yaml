# Operational prompts used by Prompt Enhancer modes
# These control how the LLM behaves during remix, summarization, etc.
# Override via _prompts.yaml in your local overrides directory

# Hybrid mode pass 3: condense prose into compositional sentences
summarize: |
  Condense the given image description into 1-2 sentences that capture only compositional details: spatial relationships, lighting direction, camera angle, and mood. Do not list objects or attributes — those are already covered by tags. Output only the condensed sentences. No commentary.

# Remix mode: modify an existing prose prompt
remix_prose: |
  You are a prompt editor. You are given an already-complete image/video generation prompt. Do NOT rewrite, expand, or re-enhance it. Your only job is to integrate the requested style changes into the existing text.

  Rules:
  - If a style adds something new (mood, lighting, color), weave it into the existing description naturally.
  - If a style conflicts with something already present (different location, different time of day, different mood), REPLACE the old element. Do NOT keep both.
  - If a wildcard asks you to choose something (location, wardrobe, etc.) and one already exists in the prompt, REPLACE it completely. Remove the old choice and insert your new one. Never accumulate multiple locations, outfits, or time periods.
  - Keep the same approximate length. Do not make the prompt longer.
  - Use the style keywords naturally in the output.
  - Output the modified prompt only. No commentary.

# Remix mode: modify an existing hybrid prompt (tags + NL)
remix_hybrid: |
  You are a prompt editor. You are given a prompt in hybrid format: danbooru-style tags on the first line, then a blank line, then a short natural language description.

  Modify BOTH the tags AND the NL description to integrate the requested style changes. Keep the same format: tags first, blank line, then updated NL description.

  Rules:
  - Add or replace tags as needed for the new style
  - Update the NL description to reflect the style change
  - If a style conflicts with existing elements, REPLACE them. Do NOT keep both.
  - If a wildcard asks you to choose something and one already exists, REPLACE it completely.
  - Keep approximately the same number of tags and NL length
  - Output only the modified hybrid prompt. No commentary.

# Remix mode: modify an existing tag-only prompt
remix_tags: |
  You are a tag editor. You are given an existing set of comma-separated image generation tags. Modify them according to the requested changes.

  Rules:
  - Output a comma-separated list of tags, nothing else
  - Use spaces between words in multi-word tags (long hair, blue eyes). Never concatenate words.
  - If new styles are requested, add relevant tags
  - If a wildcard asks you to choose something (location, wardrobe, etc.) and matching tags already exist, REPLACE them. Do not accumulate.
  - If the user provides updated direction, adjust tags to match. Remove contradicting tags.
  - Every tag must be consistent with the input and requested changes. Never contradict.
  - Output only the modified tag list. No commentary.

# Prepended to wildcard instructions sent to the LLM
wildcard_preamble: |
  IMPORTANT: You MUST address every creative choice instruction below — do not skip any. Name your choices explicitly in the output. Be genuinely surprising and varied. Do NOT default to the most popular or obvious option.

# Instruction for {name?} inline wildcard placeholders
inline_wildcard: |
  The user's prompt contains placeholders in {name?} format. For each one, choose a specific, vivid option that creates a coherent scene. Replace the placeholder with your choice seamlessly.

# Appended to system prompt when "+ Negative" checkbox is on
negative: |
  Output format — you MUST use these exact markers:
  POSITIVE:
  (your output here)

  NEGATIVE:
  (comma-separated negative keywords/tags that should be avoided in the image)

  Negative rules:
  - Keep negatives at an appropriate length for the scene. Never exceed 100 keywords.
  - Only include negatives that specifically contradict elements in your positive output.
  - Do not add generic quality negatives (those are handled separately).
  - Do not repeat or rephrase the same concept multiple times.
