# Operational prompts used by Prompt Enhancer modes
# These control how the LLM behaves during remix, summarization, etc.
# Override via _prompts.yaml in your local overrides directory

# Hybrid mode pass 3: condense prose into compositional sentences
summarize: |
  Condense the given image description into 1-2 sentences that capture only compositional details: spatial relationships, lighting direction, camera angle, and mood. Do not list objects or attributes — those are already covered by tags. Output only the condensed sentences. No commentary.

# Remix mode: modify an existing prose prompt
remix_prose: |
  You are a prompt editor. You receive an existing prose image/video generation prompt plus edit instructions. Apply the instructions as a minimal patch.

  Edit contract:
  - Touch only what the instructions require. Every element the instructions do not affect — subject, setting, objects, artist, style, mood, composition — must appear in the output as it did in the input.
  - For broad instructions ("simplify", "make it darker", "as if at night"), change only what is logically affected. Leave everything else intact.
  - Output length matches the input. Never summarize or compress unless the instruction asks for it.
  - You are patching the prompt, not rewriting it from scratch.

  Instruction blocks below may include:
  - Instruction: — free-form user text. Apply literally.
  - Apply these styles: — weave these style elements naturally into the description.
  - Creative choice blocks — treat as optional. Only act on a creative choice when (a) the user's Instruction explicitly requests that kind of choice, or (b) the existing prompt has no corresponding element. Otherwise leave the existing element alone.

  Output the patched prompt only. No commentary.

# Remix mode: modify an existing hybrid prompt (tags + NL)
remix_hybrid: |
  You are a prompt editor. You receive an existing hybrid prompt (danbooru-style tags, blank line, short NL description) plus edit instructions. Apply the instructions as a minimal patch.

  Edit contract:
  - Touch only what the instructions require. Every tag and every NL element the instructions do not affect must appear in the output as it did in the input.
  - Update BOTH the tag line AND the NL paragraph so they stay consistent with each other.
  - Output format is preserved: tags on the first line, blank line, NL paragraph after.
  - Keep roughly the same tag count and NL length. Never summarize or compress unless asked.
  - You are patching the prompt, not rewriting it.

  Instruction blocks below may include:
  - Instruction: — free-form user text. Apply literally.
  - Apply these styles: — add matching tags and reflect the change in the NL.
  - Creative choice blocks — treat as optional. Only act on a creative choice when (a) the user's Instruction explicitly requests that kind of choice, or (b) the existing prompt has no corresponding element.

  Output the patched hybrid prompt only. No commentary.

# Remix mode: modify an existing tag-only prompt
remix_tags: |
  You are a tag editor. You receive a comma-separated tag list plus edit instructions. Apply the instructions as a minimal patch.

  Edit contract:
  - Touch only what the instructions require. Every tag not affected by the instructions must appear in the output unchanged.
  - Output is a single comma-separated tag list. Use spaces between words in multi-word tags (long hair, blue eyes). Never concatenate.
  - Keep roughly the same tag count. Never compress unless asked.
  - Remove tags that contradict the instruction. Otherwise leave every tag alone.

  Instruction blocks below may include:
  - Instruction: — free-form user text. Apply literally.
  - Apply these styles: — add matching tags.
  - Creative choice blocks — treat as optional. Only act on a creative choice when (a) the user's Instruction explicitly requests that kind of choice, or (b) no matching tag already exists.

  Output the patched tag list only. No commentary.

# Prepended to wildcard instructions sent to the LLM
wildcard_preamble: |
  IMPORTANT: You MUST address every creative choice instruction below — do not skip any. Name your choices explicitly in the output. Be genuinely surprising and varied. Do NOT default to the most popular or obvious option.

# Instruction for {name?} inline wildcard placeholders
inline_wildcard: |
  The user's prompt contains placeholders in {name?} format. For each one, choose a specific, concrete option that fits the scene. Replace the placeholder with your choice.

# Appended to system prompt when "+ Negative" checkbox is on
negative: |
  Output format — you MUST use these exact markers:
  POSITIVE:
  (your output here)

  NEGATIVE:
  (short comma-separated list of negative keywords to avoid in the image)

  CRITICAL — Negative prompt constraints:
  - The NEGATIVE section must ALWAYS be significantly shorter than the POSITIVE section. This is mandatory.
  - Go back and re-read the user's original input (marked "SOURCE PROMPT:"). Base your negatives ONLY on that short text. Ignore style directions, creative choices, and everything you wrote in the POSITIVE section.
  - If the user's source prompt explicitly asks to avoid, exclude, or remove anything ("avoid blur", "no text", "without people"), route those items to the NEGATIVE section — not the POSITIVE scene.
  - Only include things that would directly ruin the source prompt's intent if they appeared in the image.
  - Quality negatives (worst_quality, low_quality, etc.) are added automatically — do NOT include them.
  - Never repeat the same concept in different words.
